<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S4 Study Tracker Pro</title>
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Smooth scrolling and hidden scrollbars for clean UI */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animations */
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom progress bar transition */
        .progress-transition { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">

    <!-- Sticky Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-100">
                <i data-lucide="book-check" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-800">S4 Tracker</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Syllabus Completion Manager</p>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="hidden md:flex flex-col items-end">
                <span id="overall-percentage-text" class="text-sm font-bold text-indigo-600">0% Mastered</span>
                <div class="w-40 h-2 bg-slate-100 rounded-full overflow-hidden mt-1.5 border border-slate-200">
                    <div id="overall-progress-bar" class="h-full bg-indigo-600 progress-transition" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Navigation Tabs -->
        <nav id="tab-container" class="flex gap-2 mb-8 overflow-x-auto pb-2 scrollbar-hide items-center">
            <!-- Tabs will be injected here dynamically -->
        </nav>

        <!-- View Content (Dashboard or Subject Details) -->
        <div id="view-content" class="animate-fade-in">
            <!-- Dynamic content injected via JavaScript -->
        </div>
    </main>

    <!-- Milestone Notification Badge -->
    <div id="milestone-badge" class="fixed bottom-8 right-8 z-50 hidden transform transition-all duration-500">
        <div class="bg-emerald-500 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 font-bold border-2 border-emerald-400">
            <div class="bg-white/20 p-1.5 rounded-lg backdrop-blur-sm">
                <i data-lucide="award" class="w-5 h-5"></i>
            </div>
            <span id="milestone-text">LEVEL UP: 25% COMPLETE</span>
        </div>
    </div>

    <!-- Exam Countdown & Motivation Overlay -->
    <div id="exam-overlay" onclick="hideCountdownOverlay()" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-md transition-all duration-500 cursor-pointer hidden opacity-0">
        <div id="exam-overlay-content" class="text-center p-8 max-w-4xl mx-auto transform scale-95 transition-transform duration-500">
            <h2 class="text-7xl md:text-9xl font-black text-white tracking-tighter mb-2 drop-shadow-2xl">
                <span id="days-remaining" class="text-indigo-400">XX</span> <span class="text-5xl md:text-7xl">DAYS</span>
            </h2>
            <p class="text-xl md:text-2xl font-bold text-slate-400 uppercase tracking-widest mb-12">Until the Exam (April 27)</p>
            
            <div class="relative mb-12">
                <i data-lucide="quote" class="absolute -top-6 -left-8 w-12 h-12 text-slate-700/50 rotate-180"></i>
                <p id="motivation-text" class="text-3xl md:text-4xl font-semibold text-white/90 leading-tight italic relative z-10">
                    "Loading motivation..."
                </p>
                <i data-lucide="quote" class="absolute -bottom-6 -right-8 w-12 h-12 text-slate-700/50"></i>
            </div>
            
            <div class="inline-flex items-center gap-2 px-6 py-3 bg-white/10 rounded-full border border-white/20 animate-pulse text-white/80">
                <span class="text-sm font-bold uppercase tracking-widest">Press Enter or Click anywhere to continue</span>
            </div>
        </div>
    </div>

    <script>
        // ORIGINAL DATA STRUCTURE - GUARANTEES NO DATA LOSS
        const SYLLABUS_DATA = {
            "Mathematics for Physical Science-4": [
                { name: "Module 1", topics: ["Random variables", "Discrete random variables & probability distributions", "Cumulative distribution function", "Expectation, Mean and variance", "Binomial distribution", "Poisson distribution & as a limit of binomial", "Joint pmf of two discrete random variables", "Marginal pmf", "Independent random variables", "Expected value of a function of two discrete variables"] },
                { name: "Module 2", topics: ["Continuous random variables & probability distributions", "Cumulative distribution function", "Expectation, Mean and variance", "Uniform, Normal and Exponential distributions", "Joint pdf of two Continuous random variables", "Marginal pdf", "Independent random variables", "Expectation value of a function of two continuous variables"] },
                { name: "Module 3", topics: ["Confidence Intervals & Confidence Level", "One-side confidence intervals for Population Mean", "Large and small samples (normal & t-distribution)", "Hypotheses and Test Procedures", "Type 1 and Type II error", "z Tests for Hypotheses (large sample)", "t Test for Hypotheses (small sample)", "Tests concerning a population proportion"] },
                { name: "Module 4", topics: ["Newton-Raphson Method", "Gauss Elimination Method", "Gauss Jordan Method", "Numerical solution of ODEs - Euler's method", "Modified Euler's method", "Runge Kutta method of 2nd Order", "Numerical solution of Laplace equation - Jacobi's Method", "Curve Fitting by Method of Least Squares", "Straight lines and Parabola"] }
            ],
            "Soil Mechanics": [
                { name: "Module 1", topics: ["Nature of soil and functional relationships", "3 phase system & Soil types", "Void ratio, porosity, degree of saturation", "Water content, specific gravity, unit weight", "Relationship between basic soil properties", "Relative Density", "Determination of Water content & Specific gravity", "Field density (sand replacement & Core Cutter)", "Soil Structure & Basic structural units of clay minerals"] },
                { name: "Module 2", topics: ["Sieve analysis & Hydrometer analysis", "Strokes law, calibration, corrections", "Gradation of soil", "Consistency Atterberg Limits and indices", "Plasticity charts & activity of soil", "Liquid Limit, Plastic Limit and Shrinkage Limit tests", "IS classification of soil", "Permeability of soils & Darcy's law", "Constant head and variable head permeability tests", "Average permeability of stratified deposits"] },
                { name: "Module 3", topics: ["Principle of effective stress", "Total, neutral and effective stress", "Pressure diagrams in layered soil", "Quick sand condition & Critical hydraulic gradient", "Boussinesq's equations for vertical Stress distribution", "Vertical pressure due to uniformly distributed loads", "Vertical pressure due to loading on rectangular area & Fadum's chart", "Approximate methods (Equivalent Point Load & 2:1 Distribution)", "Pressure Isobars & Pressure bulbs", "Distribution of contact pressure beneath footings"] },
                { name: "Module 4", topics: ["Compaction Tests (OMC and MDD, IS Light & Heavy)", "Zero Air voids line & Factors affecting compaction", "Field compaction methods & Proctor needle", "Consolidation Concepts (e-log p curve)", "Compression, Recompression index & Pre-consolidation Pressure", "Normally, over and under consolidated soils", "Terzaghi's theory of one-dimensional consolidation", "Average degree of consolidation & Time factor", "Coefficient of consolidation & Laboratory test", "Shear strength of soils & Mohr-Coulomb failure criterion", "Triaxial compression, Unconfined compression, Direct & Vane shear test"] }
            ],
            "Structural Analysis - II": [
                { name: "Module 1", topics: ["Concept of displacement approach", "Kinematic indeterminacy", "Slope Deflection Method (Concept & equations)", "Analysis of continuous beams with settlement", "Analysis of orthogonal rigid plane frames (sway/non-sway)", "Moment Distribution method (Concepts)", "Analysis of beams and non-sway frames", "Analysis of sway frames"] },
                { name: "Module 2", topics: ["Approximate Methods of Multi-storeyed Frames", "Analysis for vertical loads (substitute frames)", "Loading condition for max hogging/sagging moments", "Analysis for lateral loads (portal & cantilever method)", "Plastic Theory (Plastic hinge, modulus, shape factor)", "Redistribution of moments & collapse mechanisms", "Plastic analysis of beams and portal frames", "Equilibrium and mechanism methods"] },
                { name: "Module 3", topics: ["Matrix analysis of structures", "Flexibility method (Definition & concepts)", "Flexibility matrices for truss and frame elements", "Load transformation matrix", "Development of total flexibility matrix", "Analysis of simple determinate & indeterminate structures", "Plane truss and plane frame"] },
                { name: "Module 4", topics: ["Stiffness method (Definition & concepts)", "Development of stiffness matrices by physical approach", "Stiffness matrices for truss and frame elements", "Displacement transformation matrix", "Analysis of simple indeterminate structures", "Introduction to direct stiffness method", "Stiffness matrix of beam elements", "Assembly of load vector and stiffness matrix"] }
            ],
            "Design of Concrete Structures": [
                { name: "Module 1", topics: ["Properties of Concrete and Steel", "Philosophies of Design by Limit State Method", "IS 456:2000 design provisions", "Limit State of Collapse in Flexure (Singly Reinforced)", "Neutral Axis Depth and Moment of Resistance", "Limit State of Collapse in Shear", "Bond, Anchorage, Development Length and Splicing", "Torsion in Beams"] },
                { name: "Module 2", topics: ["Doubly Reinforced Beams", "Flanged Beams", "One-way slabs (Basic Principles, Theory & design)", "Design of Two-way Slabs", "Limit State of Serviceability (IS code provisions)"] },
                { name: "Module 3", topics: ["Compression members (Definitions & Classifications)", "Guidelines, Assumptions & modes of failure", "Analysis of Short Axially Loaded Compression Members", "Uniaxial Bending & Biaxial bending (Analysis)", "Design of Short Columns under Axial Load", "Uniaxial Bending & Biaxial bending (Design)"] },
                { name: "Module 4", topics: ["Foundations (Shallow & isolated)", "Design of square and rectangular foundation", "Axially loaded condition foundation problems", "Modelling and design of a simple framed structure", "Structural analysis and design software usage"] }
            ],
            "Numerical Methods for Engineers": [
                { name: "Module 1", topics: ["Introduction to numerical methods & Errors", "System of linear algebraic equations", "Ill-conditioned, Symmetric and Banded systems", "Gauss Elimination & Gauss Seidel iteration", "Factorization method-Choleski's method", "System of non-linear equations (Newton-Raphson)", "Eigen value problems (largest and smallest)", "Power method & Jacobi's transformation"] },
                { name: "Module 2", topics: ["Approximation (Lagrangian & Hermite interpolation)", "Spline interpolation (Quadratic and Cubic)", "Data smoothing by least squares criterion", "Non-polynomial models (exponential & power eq)", "Multiple linear regression", "Numerical integration (Newton-Cotes)", "Trapezoidal rule & Simpson's rules"] },
                { name: "Module 3", topics: ["Solution of first-order ODEs & stability", "Use of Taylor series", "Euler's method & Modified Euler's method", "Fourth order Runge-Kutta method", "Higher order ODEs by Runge-Kutta", "ODEs of boundary value type (Finite difference)"] },
                { name: "Module 4", topics: ["Partial differential equations in two-dimension", "Laplace Equation and Poisson's equation", "Parabolic equations (Explicit finite difference)", "Bender-Schmidt method", "Crank-Nicholson implicit method", "Elliptic equations (Finite difference method)", "Weighted residual methods", "Collocation, Least squares, Galerkin's method"] }
            ],
            "Economics for Engineers": [
                { name: "Module 1", topics: ["Basic economic problems & Concepts", "Production Possibility Curve", "Utility & Law of diminishing marginal utility", "Law of Demand & Law of supply", "Elasticity measurement & applications", "Equilibrium & Changes in demand/supply", "Production function & Law of variable proportion", "Economies of Scale (Internal & External)", "Cobb-Douglas Production Function"] },
                { name: "Module 2", topics: ["Cost concepts (Social, private, Explicit, implicit, Sunk)", "Opportunity cost & short run cost curves", "Revenue concepts", "Firms and their objectives & Types", "Markets - Perfect Competition", "Monopoly & Monopolistic Competition", "Oligopoly (features and equilibrium)"] },
                { name: "Module 3", topics: ["Monetary System (Money-Functions)", "Central Banking", "Inflation (Causes, Effects & Measures)", "Monetary and Fiscal policies & Deflation", "Taxation - Direct and Indirect taxes & GST", "National income (Concepts, Circular Flow, Estimation)", "Stock Market - Functions & Problems", "Demat Account and Trading Account", "Stock market Indicators (SENSEX and NIFTY)"] },
                { name: "Module 4", topics: ["Value Analysis and value Engineering", "Cost, Exchange, Use & Esteem Value", "Aims, Advantages and Application areas of VE", "Value Engineering Procedure", "Break-even Analysis", "Cost-Benefit Analysis", "Capital Budgeting", "Process planning"] }
            ]
        };

        const SYLLABUS_METADATA = {
            "Mathematics for Physical Science-4": { icon: "calculator", color: "#6366f1", short: "Maths" },
            "Soil Mechanics": { icon: "mountain", color: "#8b5cf6", short: "Soil Mechanics" },
            "Structural Analysis - II": { icon: "building-2", color: "#ec4899", short: "Struct Analysis" },
            "Design of Concrete Structures": { icon: "cuboid", color: "#f59e0b", short: "Concrete" },
            "Numerical Methods for Engineers": { icon: "binary", color: "#10b981", short: "Numerical" },
            "Economics for Engineers": { icon: "trending-up", color: "#ef4444", short: "Economics" }
        };

        // App State
        let state = {
            completedTopics: JSON.parse(localStorage.getItem('s4_study_progress_v2')) || {},
            activeTab: 'dashboard',
            expandedModules: new Set()
        };

        // Huge pool of highly motivating lines to shuffle through
        const MOTIVATION_QUOTES = [
            "Push yourself, because no one else is going to do it for you.",
            "Sometimes later becomes never. Do it right now.",
            "Great things never come from comfort zones.",
            "Success doesn’t just find you. You have to go out and get it.",
            "The harder you work for something, the greater you’ll feel when you achieve it.",
            "Dream it. Wish it. Do it.",
            "Don’t stop when you’re tired. Stop when you’re done.",
            "Wake up with determination. Go to bed with satisfaction.",
            "Do something today that your future self will thank you for.",
            "Little things make big days. Keep going.",
            "It’s going to be hard, but hard does not mean impossible.",
            "Don’t wait for opportunity. Create it.",
            "The key to success is to focus on goals, not obstacles.",
            "Dream bigger. Do bigger.",
            "You don’t have to be great to start, but you have to start to be great.",
            "Doubt kills more dreams than failure ever will.",
            "The future depends on what you do today.",
            "Don’t count the days, make the days count.",
            "Excuses will always be there for you. Opportunity won’t.",
            "Strive for progress, not perfection.",
            "A little progress each day adds up to big results.",
            "If it was easy, everyone would do it.",
            "Your limitation—it’s only your imagination.",
            "Focus on your goal. Don't look in any direction but ahead.",
            "Work hard in silence, let your success be your noise.",
            "You are entirely up to you. Make your body. Make your life.",
            "Every morning you have two choices: continue to sleep with your dreams, or wake up and chase them.",
            "Believe in yourself and all that you are. Know that there is something inside you that is greater than any obstacle.",
            "The pain you feel today will be the strength you feel tomorrow.",
            "Success is the sum of small efforts, repeated day in and day out.",
            "Discipline is doing what needs to be done, even if you don't want to do it.",
            "A river cuts through rock not because of its power, but because of its persistence.",
            "Study while others are sleeping; work while others are loafing; prepare while others are playing; and dream while others are wishing.",
            "Don't downgrade your dream just to fit your reality. Upgrade your conviction to match your destiny.",
            "You are closer than you were yesterday.",
            "There are no shortcuts to any place worth going.",
            "Focus on the step in front of you, not the whole staircase.",
            "If you want it, work for it. It's that simple.",
            "Nothing worth having comes easy.",
            "Be stronger than your excuses.",
            "The only place where success comes before work is in the dictionary.",
            "It always seems impossible until it is done.",
            "Don't let what you cannot do interfere with what you can do.",
            "I will not be stopped.",
            "Make your parents proud, your enemies jealous, and yourself happy.",
            "Stop doubting yourself, work hard, and make it happen.",
            "Your life is your masterpiece. Build it well.",
            "Action is the foundational key to all success.",
            "Success is what happens after you have survived all your disappointments.",
            "Keep your face always toward the sunshine, and shadows will fall behind you."
        ];

        // Idle Timer Variables
        let idleTime = 0;
        let idleInterval;
        const IDLE_TIMEOUT_MS = 2 * 60 * 1000; // 2 minutes

        function saveState() {
            localStorage.setItem('s4_study_progress_v2', JSON.stringify(state.completedTopics));
        }

        // Exam Countdown Logic
        function showCountdownOverlay() {
            const overlay = document.getElementById('exam-overlay');
            const daysEl = document.getElementById('days-remaining');
            const quoteEl = document.getElementById('motivation-text');
            const content = document.getElementById('exam-overlay-content');
            
            // Calculate days to April 27
            const today = new Date();
            let targetYear = today.getFullYear();
            let targetDate = new Date(targetYear, 3, 27); // Month is 0-indexed, so 3 = April
            
            // If April 27 has already passed this year, look at next year
            if (today.getTime() > targetDate.getTime()) {
                targetDate.setFullYear(targetYear + 1);
            }
            
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            daysEl.innerText = diffDays;
            
            // Get random motivation quote
            const randomQuote = MOTIVATION_QUOTES[Math.floor(Math.random() * MOTIVATION_QUOTES.length)];
            quoteEl.innerText = `"${randomQuote}"`;
            
            // Show overlay with transition
            overlay.classList.remove('hidden');
            // Small delay to ensure display:block applies before opacity
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
            
            lucide.createIcons();
        }

        function hideCountdownOverlay() {
            const overlay = document.getElementById('exam-overlay');
            const content = document.getElementById('exam-overlay-content');
            
            if (!overlay.classList.contains('hidden')) {
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0');
                content.classList.remove('scale-100');
                content.classList.add('scale-95');
                
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 500); // Matches transition duration
                
                resetIdleTimer();
            }
        }

        // Idle Timer Functions
        function resetIdleTimer() {
            idleTime = 0;
        }

        function startIdleTimer() {
            idleInterval = setInterval(() => {
                idleTime += 1000;
                if (idleTime >= IDLE_TIMEOUT_MS) {
                    showCountdownOverlay();
                    idleTime = 0; // Reset so it doesn't constantly trigger
                }
            }, 1000);

            // Listen for any activity to reset the timer
            window.addEventListener('mousemove', resetIdleTimer);
            window.addEventListener('keypress', resetIdleTimer);
            window.addEventListener('click', resetIdleTimer);
            window.addEventListener('scroll', resetIdleTimer);
        }

        // Dismiss overlay on Enter or any keypress
        document.addEventListener('keydown', (e) => {
            const overlay = document.getElementById('exam-overlay');
            if (!overlay.classList.contains('hidden')) {
                hideCountdownOverlay();
            }
        });

        function init() {
            renderTabs();
            renderView();
            updateProgress();
            
            // Show the countdown immediately when the page loads
            showCountdownOverlay();
            
            // Start listening for idle time
            startIdleTimer();
        }

        function renderTabs() {
            const container = document.getElementById('tab-container');
            let html = `<button onclick="switchTab('dashboard')" class="tab-btn flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-semibold transition-all ${state.activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'bg-white text-slate-600 hover:bg-slate-100 hover:text-indigo-600'} whitespace-nowrap">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </button>`;

            Object.keys(SYLLABUS_DATA).forEach(key => {
                const meta = SYLLABUS_METADATA[key];
                const activeClass = state.activeTab === key ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'bg-white text-slate-600 hover:bg-slate-100 hover:text-indigo-600';
                html += `<button onclick="switchTab('${key}')" class="tab-btn flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-semibold transition-all ${activeClass} whitespace-nowrap">
                    <i data-lucide="${meta.icon}" class="w-4 h-4"></i> ${meta.short}
                </button>`;
            });
            container.innerHTML = html;
            lucide.createIcons();
        }

        function switchTab(tabId) {
            state.activeTab = tabId;
            renderTabs();
            renderView();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleTopic(sub, mIdx, topic) {
            const id = `${sub}-${mIdx}-${topic}`;
            state.completedTopics[id] = !state.completedTopics[id];
            saveState();
            renderView();
            updateProgress();
        }

        function toggleModule(id) {
            if (state.expandedModules.has(id)) {
                state.expandedModules.delete(id);
            } else {
                state.expandedModules.add(id);
            }
            renderView();
        }

        function getStats() {
            return Object.keys(SYLLABUS_DATA).map(key => {
                const subject = SYLLABUS_DATA[key];
                const meta = SYLLABUS_METADATA[key];
                let total = 0;
                let done = 0;
                subject.forEach((mod, mIdx) => {
                    mod.topics.forEach(topic => {
                        total++;
                        if (state.completedTopics[`${key}-${mIdx}-${topic}`]) done++;
                    });
                });
                return {
                    name: key,
                    short: meta.short,
                    key: key,
                    completed: done,
                    remaining: total - done,
                    percentage: total > 0 ? Math.round((done / total) * 100) : 0,
                    color: meta.color,
                    icon: meta.icon
                };
            });
        }

        function updateProgress() {
            const stats = getStats();
            const total = stats.reduce((a, b) => a + (b.completed + b.remaining), 0);
            const done = stats.reduce((a, b) => a + b.completed, 0);
            const overall = total > 0 ? Math.round((done / total) * 100) : 0;

            document.getElementById('overall-percentage-text').innerText = `${overall}% Mastered`;
            document.getElementById('overall-progress-bar').style.width = `${overall}%`;

            const badge = document.getElementById('milestone-badge');
            if (overall >= 25) {
                badge.classList.remove('hidden', 'translate-y-10', 'opacity-0');
                badge.classList.add('translate-y-0', 'opacity-100');
                const text = overall === 100 ? "GOAL ACHIEVED: 100%" : `${overall >= 75 ? 'ALMOST DONE' : overall >= 50 ? 'MIDWAY' : 'STARTED'}: ${overall}%`;
                document.getElementById('milestone-text').innerText = text;
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderView() {
            const container = document.getElementById('view-content');
            const stats = getStats();

            if (state.activeTab === 'dashboard') {
                container.innerHTML = `
                    <div class="space-y-8 animate-fade-in">
                        <!-- Stats Grid -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${stats.map(s => `
                                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer" onclick="switchTab('${s.key}')">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="p-3 rounded-2xl bg-slate-50" style="color: ${s.color}">
                                            <i data-lucide="${s.icon}" class="w-6 h-6"></i>
                                        </div>
                                        <span class="text-2xl font-black" style="color: ${s.color}">${s.percentage}%</span>
                                    </div>
                                    <h3 class="font-bold text-slate-800 mb-1 truncate">${s.name}</h3>
                                    <p class="text-xs font-semibold text-slate-400 mb-4 uppercase tracking-tighter">${s.completed} Topics Done</p>
                                    <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                        <div class="h-full progress-transition" style="width: ${s.percentage}%; background-color: ${s.color}"></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <!-- Charts Section -->
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                <h3 class="text-xl font-bold mb-8 flex items-center gap-3 text-slate-800">
                                    <i data-lucide="bar-chart-3" class="w-6 h-6 text-indigo-600"></i> Subject Performance
                                </h3>
                                <div class="h-[350px]"><canvas id="barChart"></canvas></div>
                            </div>
                            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col items-center justify-center">
                                <h3 class="text-xl font-bold mb-2 text-slate-800">Total Progress</h3>
                                <div class="relative h-64 w-64"><canvas id="pieChart"></canvas></div>
                            </div>
                        </div>
                    </div>
                `;
                initCharts(stats);
            } else {
                const subModules = SYLLABUS_DATA[state.activeTab];
                const meta = SYLLABUS_METADATA[state.activeTab];
                const subStat = stats.find(s => s.key === state.activeTab);

                container.innerHTML = `
                    <div class="animate-fade-in">
                        <!-- Subject Hero -->
                        <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden mb-8">
                            <div class="px-8 py-12 text-white relative overflow-hidden" style="background: linear-gradient(135deg, ${meta.color}, ${meta.color}cc)">
                                <div class="absolute -right-10 -bottom-10 opacity-10">
                                    <i data-lucide="${meta.icon}" class="w-64 h-64"></i>
                                </div>
                                <div class="relative z-10">
                                    <div class="flex items-center gap-5 mb-6">
                                        <div class="bg-white/20 p-4 rounded-2xl backdrop-blur-md border border-white/20">
                                            <i data-lucide="${meta.icon}" class="w-10 h-10 text-white"></i>
                                        </div>
                                        <div>
                                            <h2 class="text-3xl md:text-4xl font-black tracking-tight">${state.activeTab}</h2>
                                            <p class="text-white/80 font-semibold tracking-wide mt-1 uppercase text-sm">Semester S4</p>
                                        </div>
                                    </div>
                                    <div class="flex flex-wrap items-center gap-4 mt-8">
                                        <div class="bg-white text-slate-900 px-6 py-3 rounded-2xl shadow-lg flex items-center gap-3">
                                            <span class="text-xs uppercase font-black text-slate-400">Mastery</span>
                                            <span class="text-2xl font-black">${subStat.percentage}%</span>
                                        </div>
                                        <div class="bg-white/20 backdrop-blur-md px-6 py-3 rounded-2xl border border-white/20 flex items-center gap-3">
                                            <span class="text-xs uppercase font-black text-white/60">Done</span>
                                            <span class="text-2xl font-black">${subStat.completed}</span>
                                        </div>
                                        <div class="bg-white/20 backdrop-blur-md px-6 py-3 rounded-2xl border border-white/20 flex items-center gap-3 text-white/50">
                                            <span class="text-xs uppercase font-black">Left</span>
                                            <span class="text-2xl font-black">${subStat.remaining}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Modules Checklist -->
                            <div class="p-6 md:p-10 space-y-6">
                                ${subModules.map((mod, mIdx) => {
                                    const modId = `${state.activeTab}-${mIdx}`;
                                    const isExpanded = state.expandedModules.has(modId);
                                    const modDoneCount = mod.topics.filter(t => state.completedTopics[`${state.activeTab}-${mIdx}-${t}`]).length;
                                    const modProgress = mod.topics.length > 0 ? Math.round((modDoneCount / mod.topics.length) * 100) : 0;

                                    return `
                                        <div class="border border-slate-100 rounded-[2rem] overflow-hidden transition-all duration-300 ${isExpanded ? 'shadow-lg bg-white ring-1 ring-slate-100' : 'bg-slate-50/50 hover:bg-white'}">
                                            <button onclick="toggleModule('${modId}')" class="w-full flex items-center justify-between p-6 text-left group">
                                                <div class="flex items-center gap-5">
                                                    <div class="flex items-center justify-center w-12 h-12 rounded-2xl ${modProgress === 100 ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-100 text-indigo-700'} font-black text-lg transition-colors">
                                                        ${modProgress === 100 ? '<i data-lucide="check" class="w-6 h-6"></i>' : (mIdx + 1)}
                                                    </div>
                                                    <div>
                                                        <h4 class="font-bold text-slate-800 text-lg group-hover:text-indigo-600 transition-colors">${mod.name}</h4>
                                                        <div class="flex items-center gap-3 mt-1">
                                                            <div class="w-24 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                                                <div class="h-full bg-indigo-600 transition-all duration-500" style="width: ${modProgress}%"></div>
                                                            </div>
                                                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${modDoneCount} / ${mod.topics.length} Units</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="p-2 rounded-xl bg-slate-100 text-slate-400 group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-all flex-shrink-0">
                                                    <i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" class="w-5 h-5"></i>
                                                </div>
                                            </button>
                                            
                                            ${isExpanded ? `
                                                <div class="bg-white border-t border-slate-50 p-3 space-y-1">
                                                    ${mod.topics.map(topic => {
                                                        const isDone = state.completedTopics[`${state.activeTab}-${mIdx}-${topic}`];
                                                        return `
                                                            <div onclick="toggleTopic('${state.activeTab}', ${mIdx}, '${topic.replace(/'/g, "\\'")}')" 
                                                                 class="flex items-center gap-5 p-4 rounded-2xl cursor-pointer transition-all group/topic ${isDone ? 'bg-indigo-50/30' : 'hover:bg-slate-50'}">
                                                                <div class="transition-transform duration-300 group-active/topic:scale-90 flex-shrink-0">
                                                                    <i data-lucide="${isDone ? 'check-circle-2' : 'circle'}" 
                                                                       class="w-7 h-7 ${isDone ? 'text-indigo-600 fill-indigo-50' : 'text-slate-300'}"></i>
                                                                </div>
                                                                <span class="text-base leading-relaxed ${isDone ? 'text-slate-400 line-through font-medium' : 'text-slate-700 font-semibold'} transition-all">
                                                                    ${topic}
                                                                </span>
                                                            </div>
                                                        `;
                                                    }).join('')}
                                                </div>
                                            ` : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function initCharts(stats) {
            const barCtx = document.getElementById('barChart');
            if (barCtx) {
                new Chart(barCtx, {
                    type: 'bar',
                    data: {
                        labels: stats.map(s => s.short),
                        datasets: [
                            {
                                label: 'Completed',
                                data: stats.map(s => s.completed),
                                backgroundColor: stats.map(s => s.color),
                                borderRadius: 12,
                                borderSkipped: false,
                            },
                            {
                                label: 'Remaining',
                                data: stats.map(s => s.remaining),
                                backgroundColor: '#f1f5f9',
                                borderRadius: 12,
                                borderSkipped: false,
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#1e293b',
                                padding: 12,
                                cornerRadius: 12,
                                titleFont: { size: 14, weight: 'bold' },
                                bodyFont: { size: 12 }
                            }
                        },
                        scales: {
                            x: { stacked: true, grid: { display: false }, ticks: { display: false }, border: { display: false } },
                            y: { stacked: true, grid: { display: false }, border: { display: false }, ticks: { font: { weight: 'bold', size: 12 } } }
                        }
                    }
                });
            }

            const pieCtx = document.getElementById('pieChart');
            if (pieCtx) {
                const totalDone = stats.reduce((a, b) => a + b.completed, 0);
                const totalRemaining = stats.reduce((a, b) => a + b.remaining, 0);
                new Chart(pieCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Done', 'Left'],
                        datasets: [{
                            data: [totalDone, totalRemaining],
                            backgroundColor: ['#4f46e5', '#f1f5f9'],
                            hoverOffset: 4,
                            borderWidth: 0,
                            cutout: '80%'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        animation: { animateScale: true }
                    }
                });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
